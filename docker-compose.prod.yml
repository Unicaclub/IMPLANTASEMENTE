version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: copalite-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-copalite}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-copalite_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - copalite_pgdata_prod:/var/lib/postgresql/data
      - ./copalite-backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U copalite -d copalite_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./copalite-backend
      dockerfile: Dockerfile
    container_name: copalite-backend-prod
    restart: unless-stopped
    environment:
      APP_PORT: 3000
      APP_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-copalite}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-copalite_db}
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      DB_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRATION: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      AGENT_AUTO_EXECUTE: ${AGENT_AUTO_EXECUTE:-false}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-anthropic}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./copalite-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    container_name: copalite-frontend-prod
    restart: unless-stopped
    ports:
      - '3001:3001'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: copalite-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  copalite_pgdata_prod:
