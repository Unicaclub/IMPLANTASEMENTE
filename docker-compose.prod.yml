version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: copalite-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-copalite}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-copalite_db}
    volumes:
      - copalite_pgdata_prod:/var/lib/postgresql/data
      - ./copalite-backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copalite -d copalite_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copalite-net

  redis:
    image: redis:7-alpine
    container_name: copalite-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-copalite_redis}
    volumes:
      - copalite_redis_prod:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-copalite_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - copalite-net

  backend:
    build:
      context: ./copalite-backend
      dockerfile: Dockerfile
    container_name: copalite-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=512"
      APP_PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-copalite}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-copalite_db}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY}
      CORS_ORIGIN: https://${DOMAIN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-copalite_redis}
      AGENT_AUTO_EXECUTE: ${AGENT_AUTO_EXECUTE:-false}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-anthropic}
      DEFAULT_LLM_MODEL: ${DEFAULT_LLM_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - copalite-net

  frontend:
    build:
      context: ./copalite-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: copalite-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - copalite-net

  nginx:
    image: nginx:alpine
    container_name: copalite-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ${NGINX_CONF:-./nginx/nginx.prod.conf}:/etc/nginx/nginx.prod.conf.template:ro
      - ./nginx/ssl-params.conf:/etc/nginx/snippets/ssl-params.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.prod.conf.template
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - backend
      - frontend
    networks:
      - copalite-net

  certbot:
    image: certbot/certbot:latest
    container_name: copalite-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - copalite-net

  # On-demand backup (run: docker compose --profile backup run --rm backup)
  backup:
    image: postgres:15-alpine
    container_name: copalite-backup
    restart: "no"
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USERNAME:-copalite}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_DATABASE:-copalite_db}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "pg_dump -Fc > /backups/copalite_$$(date +%Y%m%d_%H%M%S).dump && echo 'Backup OK'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - copalite-net
    profiles:
      - backup

  # Automated daily backup with 7-day retention
  backup-cron:
    image: postgres:15-alpine
    container_name: copalite-backup-cron
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USERNAME:-copalite}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_DATABASE:-copalite_db}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
        echo '0 3 * * * pg_dump -Fc > /backups/copalite_$$(date +%Y%m%d_%H%M%S).dump && find /backups -name \"copalite_*.dump\" -mtime +$$BACKUP_RETENTION_DAYS -delete && echo \"[BACKUP] $$(date) OK\"' | crontab - &&
        echo '[BACKUP] Cron scheduled: daily at 03:00, retention: '$$BACKUP_RETENTION_DAYS' days' &&
        crond -f -l 2
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - copalite-net

volumes:
  copalite_pgdata_prod:
  copalite_redis_prod:
  certbot_webroot:
  certbot_certs:

networks:
  copalite-net:
    driver: bridge
